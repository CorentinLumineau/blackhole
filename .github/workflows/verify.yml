name: Verify

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    name: Protocol Conformance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run verify
        run: bun run verify

      - name: Run build
        run: bun run build

      - name: Verify build is in sync
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: Uncommitted changes after build. Run 'bun run build' locally."
            git diff
            exit 1
          fi
