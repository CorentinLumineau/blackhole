name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Build
        run: bun run build

      - name: Run Verify
        run: bun run verify
        env:
          VERIFY_SKIP_BUILD: "1"

      - name: Verify build is in sync (Quality Gate)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: Uncommitted changes detected after build! Please run 'bun run build' locally and commit all changes."
            git diff
            exit 1
          fi

      - name: Resolve release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          NOTES_FILE=".github/releases/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "source=file" >> "$GITHUB_OUTPUT"
            echo "title=${TAG}" >> "$GITHUB_OUTPUT"
            {
              echo 'body<<EOF'
              cat "$NOTES_FILE"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "source=git-cliff" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Changelog
        if: steps.notes.outputs.source == 'git-cliff'
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ steps.notes.outputs.source == 'file' && format('{0} — Release', steps.notes.outputs.title) || '' }}
          body: ${{ steps.notes.outputs.source == 'file' && steps.notes.outputs.body || steps.git-cliff.outputs.content }}
          draft: false
          prerelease: false
