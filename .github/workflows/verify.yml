name: Verify

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

# Cancel superseded in-progress runs on the same branch/PR, but never cancel a tag run
# (a release build must complete).
concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  verify:
    name: Protocol Conformance
    # Skip on tag pushes: release.yml already runs build + verify for tags, and the
    # release-notes-gate job below covers the tag-specific check. Avoids a duplicate
    # full build+verify serializing behind the release on the single self-hosted runner.
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    # pull_request runs attacker-controllable fork code — never schedule it on the self-hosted
    # runner (public repo). Trusted push/tag events keep the self-hosted MacBook runner.
    runs-on: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["self-hosted", "mba"]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build once here; verify below skips its internal build (VERIFY_SKIP_BUILD) so the
      # build runs exactly once, and the sync-check still diffs a fresh build.
      - name: Run build
        run: bun run build

      - name: Run verify
        run: bun run verify
        env:
          VERIFY_SKIP_BUILD: "1"

      - name: Verify build is in sync
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: Uncommitted changes after build. Run 'bun run build' locally."
            git diff
            exit 1
          fi

      - name: Run install:verify
        run: bun run install:verify

  release-notes-gate:
    name: Release Notes Gate
    runs-on: [self-hosted, mba]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release notes file exists
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Skipping gate for non-semver tag: $TAG"
            exit 0
          fi
          if [ "$(git cat-file -t "refs/tags/$TAG" 2>/dev/null || echo missing)" != "tag" ]; then
            echo "Skipping gate for lightweight tag: $TAG"
            exit 0
          fi
          if [ ! -f ".github/releases/${TAG}.md" ]; then
            echo "Error: Missing .github/releases/${TAG}.md for annotated tag ${TAG}."
            echo "Run: bun run release prepare ${TAG}"
            echo "See: .github/skills/create-release/SKILL.md"
            exit 1
          fi
          echo "Release notes file present for ${TAG}"
